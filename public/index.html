<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Instana Hackathon</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f1117;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #e2e8f0;
    }

    .card {
      background: #1a1d27;
      border: 1px solid #2d3148;
      border-radius: 16px;
      padding: 48px 56px;
      text-align: center;
      box-shadow: 0 24px 64px rgba(0, 0, 0, 0.4);
      max-width: 420px;
      width: 90%;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 8px;
      color: #f8fafc;
    }

    button#trigger {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: #f60;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 14px 36px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.15s;
      width: 100%;
      min-height: 52px;
    }

    button#trigger:hover:not(:disabled) {
      opacity: 0.9;
      transform: translateY(2px);
    }

    button#trigger:active:not(:disabled) {
      transform: translateY(0);
    }

    button#trigger:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Instana Hackathon</h1>
    <button id="trigger">Send a request!</button>
  </div>

  <script>
    const btn = document.getElementById('trigger');

    btn.addEventListener('click', async () => {
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>';

      try {
        const res = await fetch('/trigger', { method: 'POST' });
        const data = await res.json();
      } finally {
        btn.disabled = false;
        btn.textContent = 'Send a request!';
      }
    });
  </script>
</body>
</html>
